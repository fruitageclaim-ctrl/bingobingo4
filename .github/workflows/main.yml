name: Bingo Data Updater

on:
  schedule:
    # 每 5 分鐘執行一次 (對應台灣時間 00, 05, 10... 等)
    - cron: '*/5 * * * *'
  workflow_dispatch: # 允許手動觸發

jobs:
  update_data:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝必要套件
        run: pip install requests beautifulsoup4

      - name: 執行爬蟲 (兩次，間隔 30 秒)
        run: |
          python crawler.py
          sleep 30
          python crawler.py

      - name: 提交並推送資料
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add bingo_data.json
          git commit -m "自動更新賓果資料: $(date)" || exit 0
          git push
