name: Bingo Data Updater

on:
  schedule:
    # 每 5 分鐘執行一次
    - cron: '*/5 * * * *'
  workflow_dispatch: # 允許手動觸發

# 加入權限設定，確保 Action 有權利寫入檔案回倉庫
permissions:
  contents: write

jobs:
  update_data:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝必要套件
        run: pip install requests beautifulsoup4

      - name: 執行爬蟲
        # 這裡不需要跑兩次，重點在於 crawler.py 的抓取邏輯是否正確
        run: python crawler.py

      - name: 提交並推送資料
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add bingo_data.json
          # 如果檔案沒有變動，commit 會失敗，用 || exit 0 忽略它
          git commit -m "自動更新賓果資料: $(date)" || exit 0
          git push
